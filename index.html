<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:black;
  color:white;
}

/* SCREENS */
.screen{
  display:none;
  height:100vh;
  width:100vw;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.show{display:flex;}

/* INPUT */
input{
  padding:15px;
  width:70%;
  border-radius:20px;
  border:2px solid #ff4d6d;
  background:black;
  color:white;
  font-size:16px;
}

/* BUTTON */
button{
  padding:14px 25px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin-top:10px;
}

/* PHOTO */
#photo{
  width:70vw;
  height:70vw;
  border-radius:20px;
  object-fit:cover;
}

/* TEXT */
#wish{
  font-size:4vw;
  line-height:1.6;
}

/* COUNT */
#count{font-size:20vw;}

/* ROAM */
#yesBtn{position:relative;}
@keyframes roam{
  0%{transform:translate(0,0);}
  25%{transform:translate(60px,-40px);}
  50%{transform:translate(-60px,40px);}
  75%{transform:translate(60px,60px);}
  100%{transform:translate(0,0);}
}
.roaming{animation:roam 0.3s infinite linear;}

/* PROPOSAL */
#proposalImg{
  width:90%;
  opacity:0;
  transform:translateY(100px);
  transition:all 2s ease;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen show">
  <h2>Enter Password</h2>
  <input id="passInput" autofocus>
  <p id="error" style="color:red;"></p>
  <button onclick="unlock()">Unlock</button>
</div>

<!-- MAIN -->
<div id="main" class="screen">
  <img id="photo" src="photo1.jpg">
  <p id="wish"></p>
  <button onclick="start()">Tap 💖</button>
</div>

<!-- COUNT -->
<div id="countScreen" class="screen">
  <h1 id="count">5</h1>
</div>

<!-- READY -->
<div id="readyScreen" class="screen">
  <h2>Are you ready?</h2>
  <button id="yesBtn" onclick="goNext()">Yes 💕</button>
</div>

<!-- WAIT -->
<div id="waitScreen" class="screen">
  <h2 id="waitText">Something special coming...</h2>
  <p id="funText"></p>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="screen">
  <img id="proposalImg" src="proposal-card.jpg">
</div>

<audio id="boom" src="boom.mp3"></audio>
<audio id="music" src="makhamali.mp3"></audio>

<script>

const boom = document.getElementById("boom");
const music = document.getElementById("music");

/* SCREEN SWITCH */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

/* PASSWORD */
document.getElementById("passInput").addEventListener("keypress",function(e){
  if(e.key==="Enter") unlock();
});

function unlock(){
  let val=document.getElementById("passInput").value.trim().toLowerCase();

  if(val==="angry bird"){
    boom.currentTime=0;
    boom.play().catch(()=>{});
    show("main");
    typeText();
  }else{
    document.getElementById("error").innerText="Wrong password";
  }
}

/* TEXT */
let text=`Wishing you a very happy and joyful birthday 🎂💗
May your life always be filled with happiness, love, and success.
May all your dreams and wishes come true.
It’s not just your birthday… it’s the day someone special like you came into this world and made my life better in many ways.
You’ve become someone really special to me. Stay the same, my favourite Angry Bird 🐦❤️
Once again, happy birthday to my special person 💗✨`;

let i=0;
function typeText(){
  let box=document.getElementById("wish");
  box.innerHTML="";
  let t=setInterval(()=>{
    box.innerHTML+=text.charAt(i++);
    if(i>=text.length) clearInterval(t);
  },60);
}

/* PHOTO SLIDER */
let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];
setInterval(()=>{
  let img=document.getElementById("photo");
  if(img){
    img.src=photos[Math.floor(Math.random()*photos.length)];
  }
},2500);

/* START */
function start(){
  boom.pause();
  boom.currentTime=0;

  show("countScreen");

  let c=5;
  let t=setInterval(()=>{
    c--;
    document.getElementById("count").innerText=c;

    if(c===0){
      clearInterval(t);
      music.play().catch(()=>{});
      show("readyScreen");
      roam();
    }
  },1000);
}

/* ROAM BUTTON */
function roam(){
  let btn=document.getElementById("yesBtn");
  btn.classList.add("roaming");
  setTimeout(()=>btn.classList.remove("roaming"),5000);
}

/* WAIT */
let funny=[
  "Wait 😏 something big is coming...",
  "Don't blink 👀",
  "Almost there 💓"
];

function goNext(){
  show("waitScreen");

  let i=0;
  setInterval(()=>{
    document.getElementById("funText").innerText=funny[i%funny.length];
    i++;
  },2000);

  setTimeout(()=>{
    showProposal();
  },20000);
}

/* PROPOSAL */
function showProposal(){
  show("proposal");

  let img=document.getElementById("proposalImg");

  setTimeout(()=>{
    img.style.opacity="1";
    img.style.transform="translateY(0)";
  },500);
}

</script>
</body>
</html>
